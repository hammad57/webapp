<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebPlatform | Home</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="theme-default" id="mainBody">

    <nav class="glass-nav">
        <div class="nav-container">
            <div class="logo">My<span>Platform</span></div>
            <div class="user-menu-wrapper">
                <button id="userIconBtn" class="account-btn">
                    <img id="navProfilePic" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="User">
                    <span id="navUsername">Account</span>
                </button>
                <div id="userDropdown" class="dropdown-card hidden">
                    <a href="signup.html" id="loginMenuBtn">Login / Signup</a>
                    <a href="#" id="settingsBtn" class="hidden">Settings</a>
                    <a href="#" id="logoutBtn" class="hidden">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <section class="section-padding">
            <h2 class="section-title">Subscription Plans</h2>
            <div class="packages-grid" id="packagesContainer">
                </div>
        </section>

        <section class="section-padding">
            <h2 class="section-title">Admin Updates</h2>
            <div id="posts-container" class="posts-grid">
                </div>
        </section>
    </main>

    <div id="settingsModal" class="modal-overlay hidden">
        <div class="settings-card">
            <div class="settings-header">
                <h2>Settings</h2>
                <button id="closeSettings">&times;</button>
            </div>
            <div class="settings-body">
                <div class="setting-group">
                    <img id="setProfilePic" src="" class="profile-lg">
                    <p>Username: <strong id="setUsername">...</strong></p>
                    <div class="input-box">
                        <label>Password</label>
                        <input type="password" id="setPass" value="******">
                        <button id="updatePass">Update</button>
                    </div>
                </div>
                <div class="setting-group">
                    <h4>Layout Setting</h4>
                    <select id="themeSelect">
                        <option value="theme-default">Default White</option>
                        <option value="theme-dark">Midnight Dark</option>
                        <option value="theme-ocean">Ocean Blue</option>
                        <option value="theme-royal">Royal Purple</option>
                        <option value="theme-sunset">Sunset Red</option>
                        <option value="theme-forest">Forest Green</option>
                        <option value="theme-gold">Golden Elite</option>
                        <option value="theme-minimal">Minimal Grey</option>
                    </select>
                    <button class="btn-primary" id="applyTheme">Apply</button>
                </div>
                <div class="setting-group">
                    <h4>Status: <span id="statusLabel">Active</span></h4>
                    <p>Expiry: <span id="expiryLabel">N/A</span></p>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
