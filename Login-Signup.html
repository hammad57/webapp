<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth | MyPlatform</title>
    <link rel="stylesheet" href="auth-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-tabs">
                <button id="loginTab" class="active" onclick="toggleAuth('login')">Login</button>
                <button id="signupTab" onclick="toggleAuth('signup')">Signup</button>
            </div>

            <form id="loginForm" class="auth-form">
                <h2>Welcome Back</h2>
                <p>Login to access your personalized settings.</p>
                
                <div class="input-group">
                    <input type="text" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Password" required>
                </div>
                
                <button type="submit" class="btn-auth">Login Now</button>
                
                <div class="divider"><span>OR</span></div>
                
                <button type="button" class="btn-google">
                    <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" alt="Google">
                    Continue with Google
                </button>
            </form>

            <form id="signupForm" class="auth-form hidden">
                <h2>Create Account</h2>
                <p>Join us and select your favorite template.</p>
                
                <div class="profile-upload-sec">
                    <div class="avatar-preview">
                        <img id="signupAvatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Avatar">
                    </div>
                    <input type="file" id="fileInput" hidden accept="image/*">
                    <label for="fileInput" class="btn-upload">Upload Photo</label>
                </div>

                <div class="input-group">
                    <input type="text" placeholder="Full Username" required>
                </div>
                <div class="input-group">
                    <input type="number" placeholder="Mobile Number" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Create Password" required>
                </div>
                
                <button type="submit" class="btn-auth">Register Account</button>
                
                <div class="divider"><span>OR</span></div>
                
                <button type="button" class="btn-google">
                    <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" alt="Google">
                    Signup with Gmail
                </button>
            </form>
        </div>
    </div>

    <script>
        // Toggle Logic
        function toggleAuth(type) {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const loginTab = document.getElementById('loginTab');
            const signupTab = document.getElementById('signupTab');

            if (type === 'login') {
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                loginTab.classList.add('active');
                signupTab.classList.remove('active');
            } else {
                loginForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
                signupTab.classList.add('active');
                loginTab.classList.remove('active');
            }
        }

        // Image Preview Logic
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function() {
                document.getElementById('signupAvatar').src = reader.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        });
    </script>
</body>
</html>
