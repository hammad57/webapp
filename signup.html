<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us | MyPlatform</title>
    <link rel="stylesheet" href="auth-styles.css">
</head>
<body>
    <div class="signup-card">
        <div class="tabs">
            <button id="tabLogin" onclick="toggleForm('login')">Login</button>
            <button id="tabSignup" class="active" onclick="toggleForm('signup')">Signup</button>
        </div>

        <div id="signupForm">
            <div class="avatar-wrapper">
                <img id="preview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
                <input type="file" id="picInput" hidden>
                <label for="picInput">Upload Photo</label>
            </div>
            <input type="text" id="sUser" placeholder="Username">
            <input type="number" id="sPhone" placeholder="Mobile Number">
            <input type="password" id="sPass" placeholder="Password">
            <button class="signup-btn" id="manualSignupBtn">Signup Now</button>
        </div>

        <div id="loginForm" class="hidden">
            <input type="text" id="lUser" placeholder="Username">
            <input type="password" id="lPass" placeholder="Password">
            <button class="signup-btn" id="manualLoginBtn">Login</button>
        </div>

        <div class="or-divider"><span>OR</span></div>
        <button class="google-btn" id="googleBtn">
            <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png"> Continue with Google
        </button>
    </div>
    <script type="module" src="auth.js"></script>
    <script>
        function toggleForm(type){
            document.getElementById('signupForm').classList.toggle('hidden', type==='login');
            document.getElementById('loginForm').classList.toggle('hidden', type==='signup');
            document.getElementById('tabLogin').classList.toggle('active', type==='login');
            document.getElementById('tabSignup').classList.toggle('active', type==='signup');
        }
    </script>
</body>
</html>
