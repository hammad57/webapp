<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Signup | MyPlatform</title>
    <link rel="stylesheet" href="auth-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-container">
        <div class="signup-card">
            <div class="header">
                <h2>Create Account</h2>
                <p>Register to explore our templates</p>
            </div>

            <form id="signupForm">
                <div class="avatar-wrapper">
                    <div class="image-circle">
                        <img id="preview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Profile">
                    </div>
                    <input type="file" id="picInput" hidden accept="image/*">
                    <label for="picInput" class="upload-label">Change Photo</label>
                </div>

                <div class="input-container">
                    <input type="email" placeholder="Email Address (abc@gmail.com)" required>
                    <input type="number" placeholder="Mobile Number" required>
                    <input type="password" placeholder="Create Password" required>
                </div>

                <button type="submit" class="signup-btn">Signup Now</button>
            </form>

            <div class="or-divider"><span>OR</span></div>

            <button class="google-btn">
                <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" alt="Google">
                Signup with Gmail
            </button>
        </div>
    </div>

    <script>
        // Image preview logic
        document.getElementById('picInput').onchange = function(evt) {
            const [file] = this.files;
            if (file) {
                document.getElementById('preview').src = URL.createObjectURL(file);
            }
        }
    </script>
</body>
</html>
