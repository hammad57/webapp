<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us | MyPlatform</title>
    <link rel="stylesheet" href="auth-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="tabs">
                <button id="loginBtn" onclick="showForm('login')">Login</button>
                <button id="signupBtn" class="active" onclick="showForm('signup')">Signup</button>
            </div>

            <div id="signupSection">
                <form id="manualSignupForm">
                    <h2>Create Account</h2>
                    <p>Enter your details to register manually.</p>

                    <div class="profile-upload">
                        <div class="preview-circle">
                            <img id="avatarPreview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
                        </div>
                        <input type="file" id="picInput" hidden accept="image/*">
                        <label for="picInput">Upload Profile Picture</label>
                    </div>

                    <input type="text" id="regUser" placeholder="Username" required>
                    <input type="number" id="regMobile" placeholder="Mobile Number" required>
                    <input type="password" id="regPass" placeholder="Password" required>
                    
                    <button type="submit" class="main-btn">Signup Now</button>
                </form>

                <div class="divider"><span>OR</span></div>

                <button class="google-btn" id="googleSignup">
                    <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png">
                    Signup with Gmail
                </button>
            </div>

            <div id="loginSection" class="hidden">
                <form id="loginForm">
                    <h2>Welcome Back</h2>
                    <input type="text" id="loginUser" placeholder="Username" required>
                    <input type="password" id="loginPass" placeholder="Password" required>
                    <button type="submit" class="main-btn">Login</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
    
    <script>
        // Simple Toggle Script
        function showForm(type) {
            const signup = document.getElementById('signupSection');
            const login = document.getElementById('loginSection');
            const sBtn = document.getElementById('signupBtn');
            const lBtn = document.getElementById('loginBtn');

            if(type === 'signup') {
                signup.classList.remove('hidden');
                login.classList.add('hidden');
                sBtn.classList.add('active');
                lBtn.classList.remove('active');
            } else {
                signup.classList.add('hidden');
                login.classList.remove('hidden');
                lBtn.classList.add('active');
                sBtn.classList.remove('active');
            }
        }

        // Image Preview handler
        document.getElementById('picInput').onchange = function(e) {
            let reader = new FileReader();
            reader.onload = function() {
                document.getElementById('avatarPreview').src = reader.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };
    </script>
</body>
</html>
